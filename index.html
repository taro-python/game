<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grid Base System</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111111; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none; 
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 1; 
        }
        /* 画面右上に現在のスケール（倍率）を表示する簡易UI */
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #27ae60;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="info-panel" id="info">Scale: 1.00</div>
<canvas id="gridCanvas"></canvas>

<script>
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    
    // 画面の表示位置と倍率の初期値
    let scale = 1.0; 
    let offset = { x: 0, y: 0 };
    
    let isDragging = false;
    let lastX, lastY, lastPinchDist = null, lastPinchMid = null;

    // キャンバスのサイズを画面いっぱいに合わせる
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // 初回のみ、画面の中心を座標(0,0)の基準点にする
        if (offset.x === 0 && offset.y === 0) {
            offset.x = canvas.width / 2;
            offset.y = canvas.height / 2;
        }
    }

    // マス目（グリッド）を描画するメイン処理
    function render() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 基準となるマスの間隔（1マス = 100ピクセル）
        const baseStep = 100;
        const gStep = baseStep * scale;
        
        // 画面のスクロール位置（offset）に合わせて格子状の線を描く
        ctx.strokeStyle = "#2c3e50"; // マス目の色（暗めの青・グレー）
        ctx.lineWidth = 1;
        
        // 縦線
        const startX = offset.x % gStep;
        for (let x = startX; x < canvas.width; x += gStep) { 
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); 
        }
        
        // 横線
        const startY = offset.y % gStep;
        for (let y = startY; y < canvas.height; y += gStep) { 
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); 
        }

        // 座標原点 (0, 0) に小さな十字マークを表示（目印用）
        ctx.strokeStyle = "#e74c3c";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(offset.x - 15, offset.y); ctx.lineTo(offset.x + 15, offset.y);
        ctx.moveTo(offset.x, offset.y - 15); ctx.lineTo(offset.x, offset.y + 15);
        ctx.stroke();

        // 右上のUIに現在の倍率を表示
        info.innerText = `Scale: ${scale.toFixed(2)}`;
    }

    // --- スマホ用タッチ操作（ドラッグ ＆ ピンチズーム） ---
    function getPinch(t) { 
        return { 
            d: Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY), 
            m: { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 } 
        }; 
    }

    canvas.addEventListener('touchstart', e => {
        if(e.touches.length == 1){ 
            isDragging = true; 
            lastX = e.touches[0].clientX; 
            lastY = e.touches[0].clientY; 
        } else if(e.touches.length == 2){ 
            isDragging = false; 
            const p = getPinch(e.touches); 
            lastPinchDist = p.d; 
            lastPinchMid = p.m; 
        }
    });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if(e.touches.length == 1 && isDragging){ 
            offset.x += e.touches[0].clientX - lastX; 
            offset.y += e.touches[0].clientY - lastY; 
            lastX = e.touches[0].clientX; 
            lastY = e.touches[0].clientY; 
        } else if(e.touches.length == 2){ 
            const p = getPinch(e.touches); 
            if(lastPinchMid){ 
                offset.x += p.m.x - lastPinchMid.x; 
                offset.y += p.m.y - lastPinchMid.y; 
                lastPinchMid = p.m; 
            } 
            if(lastPinchDist){ 
                const newScale = scale * (p.d / lastPinchDist);
                if(newScale > 0.1 && newScale < 10) scale = newScale; // ズーム範囲を制限
                lastPinchDist = p.d; 
            } 
        }
        render();
    }, {passive:false});

    window.addEventListener('touchend', () => { isDragging = false; lastPinchDist = null; lastPinchMid = null; });
    
    // --- PC用（マウス操作） ---
    canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mousemove', e => { 
        if(isDragging){ 
            offset.x += e.clientX - lastX; 
            offset.y += e.clientY - lastY; 
            lastX = e.clientX; 
            lastY = e.clientY; 
            render(); 
        }
    });
    window.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('wheel', e => { 
        e.preventDefault(); 
        const newScale = scale * (e.deltaY > 0 ? 0.9 : 1.1);
        if(newScale > 0.1 && newScale < 10) scale = newScale;
        render(); 
    }, {passive:false});

    // 初期化実行
    window.onresize = () => { resizeCanvas(); render(); };
    resizeCanvas();
    render();
</script>
</body>
</html>
