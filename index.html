<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>81mm Mortar Calc</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; padding: 15px; }
        .container { max-width: 500px; margin: auto; background: #34495e; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #f1c40f; margin-top: 0; }
        .section { margin-bottom: 15px; border-bottom: 1px solid #5d6d7e; padding-bottom: 10px; }
        label { display: block; font-size: 0.9em; margin-bottom: 5px; color: #bdc3c7; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input { width: 100%; padding: 10px; border: none; border-radius: 5px; background: #ecf0f1; font-size: 1em; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #e67e22; color: white; border: none; border-radius: 5px; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { background: #d35400; }
        .result-box { margin-top: 20px; padding: 15px; background: #1e272e; border-radius: 5px; border-left: 5px solid #f1c40f; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1.1em; }
        .val { font-weight: bold; color: #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <h2>諸元算定モジュール</h2>

    <div class="section">
        <label>① 陣地座標 (Gun Pos)</label>
        <div class="grid">
            <input type="number" id="gx" placeholder="X (East)">
            <input type="number" id="gy" placeholder="Y (North)">
        </div>
    </div>

    <div class="section">
        <label>② 観測所座標 (OP Pos)</label>
        <div class="grid">
            <input type="number" id="ox" placeholder="X (East)">
            <input type="number" id="oy" placeholder="Y (North)">
        </div>
    </div>

    <div class="section">
        <label>③ 目標座標 (Target Pos)</label>
        <div class="grid">
            <input type="number" id="tx" placeholder="X (East)">
            <input type="number" id="ty" placeholder="Y (North)">
        </div>
    </div>

    <button onclick="calculate()">算定実行</button>

    <div class="result-box" id="results">
        <div class="result-item">射距離: <span class="val" id="r_dist">-</span> m</div>
        <div class="result-item">射向 (ミル): <span class="val" id="r_az">-</span> mil</div>
        <div class="result-item">観測角 (ミル): <span class="val" id="r_op_az">-</span> mil</div>
        <div class="result-item">OT距離: <span class="val" id="r_ot_dist">-</span> m</div>
    </div>
</div>

<script>
    function toMil(rad) {
        // ラジアンをミル(6400)に変換
        let mil = rad * (3200 / Math.PI);
        if (mil < 0) mil += 6400;
        return Math.round(mil);
    }

    function calculate() {
        // 入力値取得
        const gx = parseFloat(document.getElementById('gx').value);
        const gy = parseFloat(document.getElementById('gy').value);
        const ox = parseFloat(document.getElementById('ox').value);
        const oy = parseFloat(document.getElementById('oy').value);
        const tx = parseFloat(document.getElementById('tx').value);
        const ty = parseFloat(document.getElementById('ty').value);

        if (isNaN(gx) || isNaN(gy) || isNaN(tx) || isNaN(ty)) {
            alert("陣地と目標の座標を入力してください");
            return;
        }

        // 1. 陣地から目標への計算
        const dx = tx - gx;
        const dy = ty - gy;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const azRad = Math.atan2(dx, dy); // 北基準(Y軸)の角度
        const azMil = toMil(azRad);

        // 2. 観測所から目標への計算 (OT計算)
        let opAzMil = "-";
        let otDist = "-";
        if (!isNaN(ox) && !isNaN(oy)) {
            const odx = tx - ox;
            const ody = ty - oy;
            otDist = Math.sqrt(odx*odx + ody*ody).toFixed(0);
            const opAzRad = Math.atan2(odx, ody);
            opAzMil = toMil(opAzRad);
        }

        // 結果表示
        document.getElementById('r_dist').innerText = dist.toFixed(0);
        document.getElementById('r_az').innerText = azMil;
        document.getElementById('r_op_az').innerText = opAzMil;
        document.getElementById('r_ot_dist').innerText = otDist;
    }
</script>

</body>
</html>
