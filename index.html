<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Grid System</title>
    <style>
        body { 
            font-family: sans-serif; 
            background: #111111; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none; 
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 1; 
        }
        .info-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #27ae60;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="info-panel" id="info">Scale: 1.00</div>
<canvas id="gridCanvas"></canvas>

<script>
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    
    let scale = 1.0; 
    let offset = { x: 0, y: 0 };
    
    let isDragging = false;
    let lastX, lastY, lastPinchDist = null;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if (offset.x === 0 && offset.y === 0) {
            offset.x = canvas.width / 2;
            offset.y = canvas.height / 2;
        }
    }

    function render() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const baseStep = 100;
        const gStep = baseStep * scale;
        
        ctx.strokeStyle = "#2c3e50"; 
        ctx.lineWidth = 1;
        
        // 縦線
        const startX = offset.x % gStep;
        for (let x = startX; x < canvas.width; x += gStep) { 
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); 
        }
        
        // 横線
        const startY = offset.y % gStep;
        for (let y = startY; y < canvas.height; y += gStep) { 
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); 
        }

        // 座標原点 (0, 0) の赤十字
        ctx.strokeStyle = "#e74c3c";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(offset.x - 15, offset.y); ctx.lineTo(offset.x + 15, offset.y);
        ctx.moveTo(offset.x, offset.y - 15); ctx.lineTo(offset.x, offset.y + 15);
        ctx.stroke();

        info.innerText = `Scale: ${scale.toFixed(2)}`;
    }

    // 指定した画面座標（centerX, centerY）を中心に拡大縮小する共通関数
    function zoomAt(centerX, centerY, zoomFactor) {
        const newScale = scale * zoomFactor;
        if (newScale < 0.1 || newScale > 10) return; // ズーム制限

        // ズーム中心点の「グリッド原点からの相対距離」が維持されるように位置を補正
        offset.x = centerX - (centerX - offset.x) * zoomFactor;
        offset.y = centerY - (centerY - offset.y) * zoomFactor;
        scale = newScale;
    }

    // 二本指の中心と距離を取得
    function getPinch(t) { 
        return { 
            d: Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY), 
            m: { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 } 
        }; 
    }

    // --- タッチ操作 ---
    canvas.addEventListener('touchstart', e => {
        if(e.touches.length == 1){ 
            isDragging = true; 
            lastX = e.touches[0].clientX; 
            lastY = e.touches[0].clientY; 
        } else if(e.touches.length == 2){ 
            isDragging = false; 
            const p = getPinch(e.touches); 
            lastPinchDist = p.d; 
        }
    });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if(e.touches.length == 1 && isDragging){ 
            offset.x += e.touches[0].clientX - lastX; 
            offset.y += e.touches[0].clientY - lastY; 
            lastX = e.touches[0].clientX; 
            lastY = e.touches[0].clientY; 
        } else if(e.touches.length == 2){ 
            const p = getPinch(e.touches); 
            if(lastPinchDist){ 
                const zoomFactor = p.d / lastPinchDist;
                // 二本指の「真ん中の点」を基準にズーム
                zoomAt(p.m.x, p.m.y, zoomFactor);
                lastPinchDist = p.d; 
            } 
        }
        render();
    }, {passive:false});

    window.addEventListener('touchend', () => { isDragging = false; lastPinchDist = null; });
    
    // --- PC用（マウス操作） ---
    canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
    window.addEventListener('mousemove', e => { 
        if(isDragging){ 
            offset.x += e.clientX - lastX; 
            offset.y += e.clientY - lastY; 
            lastX = e.clientX; 
            lastY = e.clientY; 
            render(); 
        }
    });
    window.addEventListener('mouseup', () => isDragging = false);
    
    canvas.addEventListener('wheel', e => { 
        e.preventDefault(); 
        const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
        // 「マウスカーソルの位置」を基準にズーム
        zoomAt(e.clientX, e.clientY, zoomFactor);
        render(); 
    }, {passive:false});

    window.onresize = () => { resizeCanvas(); render(); };
    resizeCanvas();
    render();
</script>
</body>
</html>
