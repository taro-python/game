<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mortar Tactical Plotter</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #e0e0e0; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        .panel { background: #2d3436; padding: 12px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h3 { margin: 0 0 10px 0; color: #f1c40f; font-size: 1em; text-align: center; }
        
        .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        label { display: block; font-size: 0.7em; color: #aaa; margin-bottom: 3px; }
        input { width: 100%; padding: 8px; border: none; border-radius: 4px; background: #ecf0f1; font-size: 1em; font-weight: bold; box-sizing: border-box; }
        
        .btn-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }
        button { padding: 12px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; color: white; }
        .btn-calc { background: #d35400; }
        .btn-save { background: #27ae60; }
        .btn-clear { background: #c0392b; }
        button:active { opacity: 0.8; transform: scale(0.98); }

        .canvas-wrapper { position: relative; width: 100%; background: #000; border: 2px solid #444; border-radius: 4px; aspect-ratio: 1 / 1; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        
        .history-panel { margin-top: 10px; font-size: 0.8em; max-height: 150px; overflow-y: auto; background: #000; padding: 5px; border-radius: 4px; }
        .history-item { border-bottom: 1px solid #333; padding: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>弾着プロット入力</h3>
        <div class="input-row">
            <div><label>装薬</label><input type="number" id="chg" value="3"></div>
            <div><label>方位(mil)</label><input type="number" id="az" value="3200"></div>
            <div><label>射角</label><input type="number" id="elv" value="1100"></div>
        </div>
        <div class="btn-grid">
            <button class="btn-calc" onclick="addPlot()">プロット追加</button>
            <button class="btn-save" onclick="saveData()">保存</button>
            <button class="btn-clear" onclick="clearData()">全消去</button>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gridCanvas"></canvas>
    </div>

    <div class="history-panel" id="history">
        <div style="color:#777; text-align:center;">履歴なし</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    let plots = []; // プロットされたデータの配列

    const REVERSE_TABLE = {
        3: [{elv:1400, r:600}, {elv:1300, r:1300}, {elv:1200, r:2100}, {elv:1100, r:2800}, {elv:1000, r:3500}, {elv:800, r:4500}]
    };

    function init() {
        canvas.width = canvas.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.clientHeight * window.devicePixelRatio;
        loadData(); // 起動時に自動読み込み
        render();
    }

    function getRange(chg, elv) {
        const table = REVERSE_TABLE[3]; // サンプルとしてChg3固定
        for(let i=0; i<table.length-1; i++) {
            if(elv <= table[i].elv && elv >= table[i+1].elv) {
                const t = (elv - table[i].elv) / (table[i+1].elv - table[i].elv);
                return table[i].r + t * (table[i+1].r - table[i].r);
            }
        }
        return 0;
    }

    function addPlot() {
        const chg = parseInt(document.getElementById('chg').value);
        const az = parseInt(document.getElementById('az').value);
        const elv = parseInt(document.getElementById('elv').value);
        const range = getRange(chg, elv);

        if(range === 0) { alert("射表範囲外です"); return; }

        plots.push({ chg, az, elv, range, id: Date.now() });
        updateHistory();
        render();
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const centerX = canvas.width / 2;
        const centerY = canvas.height * 0.9;
        const scale = 0.08;

        // グリッド描画
        ctx.strokeStyle = "#222";
        for(let i=0; i<canvas.width; i+=100*scale) {
            ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke();
        }

        // 全プロット描画
        plots.forEach((p, index) => {
            const azRad = (p.az * (Math.PI / 3200));
            const x = centerX + (p.range * Math.sin(azRad) * scale);
            const y = centerY - (p.range * Math.cos(azRad) * scale);
            
            // 散布界 (長方形)
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(azRad);
            ctx.strokeStyle = (index === plots.length - 1) ? "#f1c40f" : "#2ecc71"; // 最新は黄色
            ctx.lineWidth = 2;
            ctx.strokeRect(-15*scale, -50*scale, 30*scale, 100*scale);
            ctx.fillStyle = "rgba(46, 204, 113, 0.1)";
            ctx.fillRect(-15*scale, -50*scale, 30*scale, 100*scale);
            ctx.restore();

            // 点
            ctx.fillStyle = (index === plots.length - 1) ? "#f1c40f" : "#e74c3c";
            ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
        });

        // 陣地
        ctx.fillStyle = "#3498db";
        ctx.beginPath(); ctx.arc(centerX, centerY, 6, 0, Math.PI*2); ctx.fill();
    }

    function updateHistory() {
        const histDiv = document.getElementById('history');
        histDiv.innerHTML = plots.map(p => `
            <div class="history-item">
                <span>Az: ${p.az} / Elv: ${p.elv}</span>
                <span style="color:#f1c40f">${Math.round(p.range)}m</span>
            </div>
        `).reverse().join('');
    }

    // 保存機能 (Local Storage)
    function saveData() {
        localStorage.setItem('mortar_plots', JSON.stringify(plots));
        alert("ブラウザに現在のデータを保存しました。");
    }

    // 読み込み機能
    function loadData() {
        const saved = localStorage.getItem('mortar_plots');
        if(saved) {
            plots = JSON.parse(saved);
            updateHistory();
            render();
        }
    }

    // 消去機能
    function clearData() {
        if(confirm("全てのプロットを消去しますか？")) {
            plots = [];
            localStorage.removeItem('mortar_plots');
            updateHistory();
            render();
        }
    }

    window.onload = init;
</script>
</body>
</html>
