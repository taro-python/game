<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MGRS Plotter - Hierarchical Menu</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #111111; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none; 
            color: #e0e0e0;
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 1; 
        }

        /* ハンバーガーメニューボタン */
        .menu-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: rgba(30, 39, 46, 0.9);
            border: 1px solid #3c6382;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .menu-btn div {
            width: 100%;
            height: 3px;
            background: #f5f6fa;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* サイドパネル（少し幅を広げて320pxに最適化） */
        .side-panel {
            position: absolute;
            top: 0;
            left: -340px; 
            width: 320px;
            height: 100vh;
            background: rgba(24, 32, 38, 0.98);
            box-shadow: 5px 0 25px rgba(0,0,0,0.7);
            z-index: 90;
            transition: transform 0.3s ease;
            padding: 80px 0 20px 0;
            box-sizing: border-box;
            overflow-y: auto;
            border-right: 1px solid #2c3e50;
        }
        .side-panel.open {
            transform: translateX(340px);
        }

        /* 2階層アコーディオンのスタイル */
        .menu-category {
            border-bottom: 1px solid #2c3e50;
        }
        .menu-header {
            padding: 15px 20px;
            background: #1e272e;
            font-weight: bold;
            font-size: 1em;
            color: #00d2d3;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }
        .menu-header:hover {
            background: #2f3542;
        }
        .menu-header::after {
            content: '▼';
            font-size: 0.8em;
            color: #718093;
            transition: transform 0.2s;
        }
        .menu-category.active .menu-header::after {
            transform: rotate(-180deg);
            color: #00d2d3;
        }
        
        /* 子階層のコンテンツエリア */
        .menu-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #182026;
        }
        .menu-category.active .menu-content {
            max-height: 800px; /* 十分な高さを確保 */
            transition: max-height 0.3s ease-in;
        }
        .menu-inner-padding {
            padding: 20px;
        }

        /* 入力グループ */
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .label-zone { color: #00d2d3; }   
        .label-pos { color: #ff9f43; }    
        .label-op1 { color: #54a0ff; }    
        .label-op2 { color: #00cec9; }    
        .label-target { color: #ff6b6b; } 

        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #2f3640;
            border: 1px solid #57606f;
            border-radius: 6px;
            color: #fff;
            font-family: monospace;
            font-size: 1.1em;
            font-weight: bold;
            box-sizing: border-box;
            letter-spacing: 1px;
        }
        input[type="text"]:focus {
            outline: 2px solid #00d2d3;
            background: #353b48;
        }
        .hint {
            font-size: 0.75em;
            color: #9c88ff;
            margin-top: 4px;
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #10ac84;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { background: #1dd1a1; }

        /* ステータスインフォパネル */
        .info-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #1dd1a1;
            padding: 10px 14px;
            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            font-size: 0.9em;
            line-height: 1.4em;
            text-align: right;
            border: 1px solid rgba(60, 99, 130, 0.4);
        }
    </style>
</head>
<body>

<!-- ハンバーガーボタン -->
<div class="menu-btn" id="menuBtn" onclick="toggleMenu(event)">
    <div></div>
    <div></div>
    <div></div>
</div>

<!-- サイドパネル -->
<div class="side-panel" id="sidePanel" onclick="event.stopPropagation()">
    
    <!-- 第1階層：座標登録 -->
    <div class="menu-category active" id="cat_registration">
        <div class="menu-header" onclick="toggleCategory('cat_registration')">座標登録</div>
        <div class="menu-content">
            <div class="menu-inner-padding">
                <div class="input-group">
                    <label class="label-zone">■ グリッドゾーン指定</label>
                    <input type="text" id="mgrs_zone" placeholder="例: 54TYP" value="">
                </div>
                <div class="input-group">
                    <label class="label-pos">▼ 陣地座標 (赤三角 / 基準点)</label>
                    <input type="text" id="mgrs_pos" placeholder="例: 12345678" value="">
                </div>
                <div class="input-group">
                    <label class="label-op1">▼ 第1観測座標 [OP1] (青三角)</label>
                    <input type="text" id="mgrs_op1" placeholder="例: 12505200" value="">
                </div>
                <div class="input-group">
                    <label class="label-op2">▼ 第2観測座標 [OP2] (水色三角)</label>
                    <input type="text" id="mgrs_op2" placeholder="例: 12605100" value="">
                </div>
                <div class="input-group">
                    <label class="label-target">▼ 目標座標 [TG] (赤十字)</label>
                    <input type="text" id="mgrs_target" placeholder="例: 13005500" value="">
                </div>
                <button class="btn-submit" onclick="processCoordinates()">座標をマップに反映</button>
            </div>
        </div>
    </div>

    <!-- 第2階層：判定入力 -->
    <div class="menu-category" id="cat_judgment">
        <div class="menu-header" onclick="toggleCategory('cat_judgment')">判定入力</div>
        <div class="menu-content">
            <div class="menu-inner-padding">
                <p style="font-size: 0.9em; color: #a4b0be; margin: 0;">弾着修正・判定データ等の入力項目（今後の拡張用エリア）</p>
            </div>
        </div>
    </div>

    <!-- 第3階層：マップ表示 -->
    <div class="menu-category" id="cat_map_display">
        <div class="menu-header" onclick="toggleCategory('cat_map_display')">マップ表示</div>
        <div class="menu-content">
            <div class="menu-inner-padding">
                <p style="font-size: 0.9em; color: #a4b0be; margin: 0 0 10px 0;">表示設定・確認用エリア</p>
                <button class="btn-submit" style="background: #2c3e50;" onclick="resetView()">表示位置をリセット</button>
            </div>
        </div>
    </div>

</div>

<!-- 情報表示パネル -->
<div class="info-panel" id="info">
    <div id="info_zone">Area: --</div>
    <div id="info_scale">Scale: 1.00 (1マス=100m)</div>
</div>
<canvas id="gridCanvas"></canvas>

<script>
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    const infoZone = document.getElementById('info_zone');
    const infoScale = document.getElementById('info_scale');
    const sidePanel = document.getElementById('sidePanel');
    
    let scale = 0.5; 
    let offset = { x: 0, y: 0 };
    let currentZone = ""; 
    
    let isDragging = false;
    let lastX, lastY, lastPinchDist = null;

    let points = {
        pos: { x: 0, y: 0, valid: false },      
        op1: { x: 0, y: 0, valid: false },       
        op2: { x: 0, y: 0, valid: false },       
        target: { x: 0, y: 0, valid: false }    
    };

    // メニュー全体の開閉
    function toggleMenu(e) {
        if(e) e.stopPropagation();
        sidePanel.classList.toggle('open');
    }

    function closeMenu() {
        if(sidePanel.classList.contains('open')) {
            sidePanel.classList.remove('open');
        }
    }

    // 各アコーディオンカテゴリの開閉切り替え
    function toggleCategory(id) {
        const cat = document.getElementById(id);
        cat.classList.toggle('active');
    }

    // マップの表示位置を中心（初期位置）に戻す
    function resetView() {
        scale = 0.5;
        offset.x = canvas.width / 2;
        offset.y = canvas.height / 2;
        closeMenu();
        render();
    }

    function parseMGRS(str) {
        const cleaned = str.replace(/\s+/g, ''); 
        const len = cleaned.length;
        if (len !== 8 && len !== 10) return null;
        
        const half = len / 2;
        let east = parseInt(cleaned.substring(0, half));
        let north = parseInt(cleaned.substring(half));
        if (isNaN(east) || isNaN(north)) return null;

        if (len === 8) { east *= 10; north *= 10; }
        return { e: east, n: north };
    }

    function processCoordinates() {
        currentZone = document.getElementById('mgrs_zone').value.trim().toUpperCase();

        const rawPos = parseMGRS(document.getElementById('mgrs_pos').value);
        const rawOp1 = parseMGRS(document.getElementById('mgrs_op1').value);
        const rawOp2 = parseMGRS(document.getElementById('mgrs_op2').value);
        const rawTarget = parseMGRS(document.getElementById('mgrs_target').value);

        if (!rawPos) {
            alert("陣地座標(基準)の入力が正しくありません。");
            return;
        }

        points.pos = { x: 0, y: 0, valid: true };
        points.op1 = rawOp1 ? { x: rawOp1.e - rawPos.e, y: rawOp1.n - rawPos.n, valid: true } : { valid: false };
        points.op2 = rawOp2 ? { x: rawOp2.e - rawPos.e, y: rawOp2.n - rawPos.n, valid: true } : { valid: false };
        points.target = rawTarget ? { x: rawTarget.e - rawPos.e, y: rawTarget.n - rawPos.n, valid: true } : { valid: false };

        closeMenu();
        render();
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if (offset.x === 0 && offset.y === 0) {
            offset.x = canvas.width / 2;
            offset.y = canvas.height / 2;
        }
    }

    function render() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const meterPerGrid = 100;
        const gStep = meterPerGrid * scale; 
        
        ctx.strokeStyle = "#1e272e"; 
        ctx.lineWidth = 1;
        
        const startX = offset.x % gStep;
        for (let x = startX; x < canvas.width; x += gStep) { 
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); 
        }
        const startY = offset.y % gStep;
        for (let y = startY; y < canvas.height; y += gStep) { 
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); 
        }

        const toPX = (mx, my) => ({
            x: offset.x + mx * scale,
            y: offset.y - my * scale 
        });

        const drawTriangle = (p, color, label) => {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(p.x, p.y - 12);     
            ctx.lineTo(p.x + 12, p.y + 10); 
            ctx.lineTo(p.x - 12, p.y + 10); 
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "bold 12px sans-serif";
            ctx.fillText(label, p.x + 16, p.y + 5);
        };

        if (points.pos.valid) drawTriangle(toPX(points.pos.x, points.pos.y), "#ff9f43", "陣地");
        if (points.op1.valid) drawTriangle(toPX(points.op1.x, points.op1.y), "#54a0ff", "OP1");
        if (points.op2.valid) drawTriangle(toPX(points.op2.x, points.op2.y), "#00cec9", "OP2");

        if (points.target.valid) {
            const p = toPX(points.target.x, points.target.y);
            ctx.strokeStyle = "#ff6b6b";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(p.x - 15, p.y); ctx.lineTo(p.x + 15, p.y);
            ctx.moveTo(p.x, p.y - 15); ctx.lineTo(p.x, p.y + 15);
            ctx.stroke();
            ctx.fillStyle = "#ff6b6b";
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "bold 12px sans-serif";
            ctx.fillText("目標(TG)", p.x + 18, p.y + 5);
        }

        infoZone.innerText = `Area: ${currentZone || '--'}`;
        infoScale.innerText = `Scale: ${scale.toFixed(2)} (1マス=100m)`;
    }

    function zoomAt(centerX, centerY, zoomFactor) {
        const newScale = scale * zoomFactor;
        if (newScale < 0.05 || newScale > 20) return; 
        offset.x = centerX - (centerX - offset.x) * zoomFactor;
        offset.y = centerY - (centerY - offset.y) * zoomFactor;
        scale = newScale;
    }

    function getPinch(t) { 
        return { 
            d: Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY), 
            m: { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 } 
        }; 
    }

    // --- 各種イベント ---
    canvas.addEventListener('touchstart', e => {
        if(sidePanel.classList.contains('open')) { closeMenu(); return; }
        if(e.touches.length == 1){ isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; }
        else if(e.touches.length == 2){ isDragging = false; lastPinchDist = getPinch(e.touches).d; }
    });

    canvas.addEventListener('touchmove', e => {
        if(!isDragging && lastPinchDist === null) return;
        e.preventDefault();
        if(e.touches.length == 1 && isDragging){ 
            offset.x += e.touches[0].clientX - lastX; offset.y += e.touches[0].clientY - lastY; 
            lastX = e.touches[0].clientX; lastY = e.touches[0].clientY; 
        } else if(e.touches.length == 2){ 
            const p = getPinch(e.touches); 
            if(lastPinchDist){ zoomAt(p.m.x, p.m.y, p.d / lastPinchDist); lastPinchDist = p.d; } 
        }
        render();
    }, {passive:false});

    window.addEventListener('touchend', () => { isDragging = false; lastPinchDist = null; });
    
    canvas.addEventListener('mousedown', e => { 
        if(sidePanel.classList.contains('open')) { closeMenu(); return; }
        isDragging = true; lastX = e.clientX; lastY = e.clientY; 
    });
    window.addEventListener('mousemove', e => { 
        if(isDragging){ 
            offset.x += e.clientX - lastX; offset.y += e.clientY - lastY; 
            lastX = e.clientX; lastY = e.clientY; render(); 
        }
    });
    window.addEventListener('mouseup', () => isDragging = false);
    canvas.addEventListener('wheel', e => { 
        e.preventDefault(); zoomAt(e.clientX, e.clientY, e.deltaY > 0 ? 0.9 : 1.1); render(); 
    }, {passive:false});

    window.onresize = () => { resizeCanvas(); render(); };
    resizeCanvas();
    render(); 
</script>
</body>
</html>
