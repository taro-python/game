<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MGRS Plotter System - Clean</title>
    <style>
        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: #111111; 
            margin: 0; 
            overflow: hidden; 
            touch-action: none; 
            user-select: none; 
            color: #e0e0e0;
        }
        canvas { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 1; 
        }

        /* ハンバーガーメニューボタン */
        .menu-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 45px;
            height: 45px;
            background: rgba(30, 39, 46, 0.9);
            border: 1px solid #3c6382;
            border-radius: 8px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .menu-btn div {
            width: 100%;
            height: 3px;
            background: #f5f6fa;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* 座標登録サイドパネル */
        .side-panel {
            position: absolute;
            top: 0;
            left: -320px; 
            width: 300px;
            height: 100vh;
            background: rgba(30, 39, 46, 0.95);
            box-shadow: 5px 0 25px rgba(0,0,0,0.7);
            z-index: 90;
            transition: transform 0.3s ease;
            padding: 80px 20px 20px 20px;
            box-sizing: border-box;
            overflow-y: auto;
            border-right: 1px solid #3c6382;
        }
        .side-panel.open {
            transform: translateX(320px);
        }
        .side-panel h3 {
            color: #00d2d3;
            margin-top: 0;
            border-bottom: 2px solid #3c6382;
            padding-bottom: 8px;
            font-size: 1.2em;
        }

        /* 入力グループ */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 0.85em;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .label-target { color: #ff6b6b; } /* 赤十字 */
        .label-op { color: #54a0ff; }     /* 青三角 */
        .label-pos { color: #ff9f43; }    /* 赤三角 */

        input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #2f3640;
            border: 1px solid #718093;
            border-radius: 6px;
            color: #fff;
            font-family: monospace;
            font-size: 1.1em;
            font-weight: bold;
            box-sizing: border-box;
            letter-spacing: 1px;
        }
        input[type="text"]:focus {
            outline: 2px solid #00d2d3;
            background: #353b48;
        }
        .hint {
            font-size: 0.75em;
            color: #9c88ff;
            margin-top: 4px;
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #10ac84;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover { background: #1dd1a1; }

        .info-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #1dd1a1;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

<!-- ハンバーガーボタン -->
<div class="menu-btn" id="menuBtn" onclick="toggleMenu(event)">
    <div></div>
    <div></div>
    <div></div>
</div>

<!-- サイドパネル（数値はすべて無記入にリセット） -->
<div class="side-panel" id="sidePanel" onclick="event.stopPropagation()">
    <h3>座標登録 (MGRS)</h3>
    
    <div class="input-group">
        <label class="label-pos">▼ 陣地座標 (赤三角 / 基準点)</label>
        <input type="text" id="mgrs_pos" placeholder="例: 12345678" value="">
        <span class="hint">※8桁または10桁の数字を入力</span>
    </div>

    <div class="input-group">
        <label class="label-op">▼ 観測座標 (青三角)</label>
        <input type="text" id="mgrs_op" placeholder="例: 12505200" value="">
    </div>

    <div class="input-group">
        <label class="label-target">▼ 目標座標 (赤十字)</label>
        <input type="text" id="mgrs_target" placeholder="例: 13005500" value="">
    </div>

    <button class="btn-submit" onclick="processCoordinates()">座標をマップに反映</button>
</div>

<div class="info-panel" id="info">Scale: 1.00</div>
<canvas id="gridCanvas"></canvas>

<script>
    const canvas = document.getElementById('gridCanvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    const sidePanel = document.getElementById('sidePanel');
    
    let scale = 0.5; 
    let offset = { x: 0, y: 0 };
    
    let isDragging = false;
    let lastX, lastY, lastPinchDist = null;

    // 初期状態はすべて非表示(valid: false)からスタート
    let points = {
        pos: { x: 0, y: 0, valid: false },      
        op: { x: 0, y: 0, valid: false },       
        target: { x: 0, y: 0, valid: false }    
    };

    // メニューの開閉（イベント伝播を止めて親の「メニュー外タップ」に引っかからないようにする）
    function toggleMenu(e) {
        if(e) e.stopPropagation();
        sidePanel.classList.toggle('open');
    }

    // メニューを確実に閉じる関数
    function closeMenu() {
        if(sidePanel.classList.contains('open')) {
            sidePanel.classList.remove('open');
        }
    }

    function parseMGRS(str) {
        const cleaned = str.replace(/\s+/g, ''); 
        const len = cleaned.length;
        
        if (len !== 8 && len !== 10) return null;
        
        const half = len / 2;
        let east = parseInt(cleaned.substring(0, half));
        let north = parseInt(cleaned.substring(half));
        
        if (isNaN(east) || isNaN(north)) return null;

        if (len === 8) {
            east *= 10;
            north *= 10;
        }
        return { e: east, n: north };
    }

    function processCoordinates() {
        const rawPos = parseMGRS(document.getElementById('mgrs_pos').value);
        const rawOp = parseMGRS(document.getElementById('mgrs_op').value);
        const rawTarget = parseMGRS(document.getElementById('mgrs_target').value);

        if (!rawPos) {
            alert("陣地座標(基準)の入力が正しくありません。8桁または10桁の数字を入力してください。");
            return;
        }

        points.pos = { x: 0, y: 0, valid: true };

        if (rawOp) {
            points.op = { x: rawOp.e - rawPos.e, y: rawOp.n - rawPos.n, valid: true };
        } else {
            points.op.valid = false;
        }

        if (rawTarget) {
            points.target = { x: rawTarget.e - rawPos.e, y: rawTarget.n - rawPos.n, valid: true };
        } else {
            points.target.valid = false;
        }

        closeMenu();
        render();
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if (offset.x === 0 && offset.y === 0) {
            offset.x = canvas.width / 2;
            offset.y = canvas.height / 2;
        }
    }

    function render() {
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const meterPerGrid = 100;
        const gStep = meterPerGrid * scale; 
        
        ctx.strokeStyle = "#1e272e"; 
        ctx.lineWidth = 1;
        
        const startX = offset.x % gStep;
        for (let x = startX; x < canvas.width; x += gStep) { 
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); 
        }
        const startY = offset.y % gStep;
        for (let y = startY; y < canvas.height; y += gStep) { 
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); 
        }

        const toPX = (mx, my) => ({
            x: offset.x + mx * scale,
            y: offset.y - my * scale 
        });

        // ① 陣地座標 (赤三角)
        if (points.pos.valid) {
            const p = toPX(points.pos.x, points.pos.y);
            ctx.fillStyle = "#ff9f43";
            ctx.beginPath();
            ctx.moveTo(p.x, p.y - 12);     
            ctx.lineTo(p.x + 12, p.y + 10); 
            ctx.lineTo(p.x - 12, p.y + 10); 
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "bold 12px sans-serif";
            ctx.fillText("陣地", p.x + 16, p.y + 5);
        }

        // ② 観測座標 (青三角)
        if (points.op.valid) {
            const p = toPX(points.op.x, points.op.y);
            ctx.fillStyle = "#54a0ff";
            ctx.beginPath();
            ctx.moveTo(p.x, p.y - 12);
            ctx.lineTo(p.x + 12, p.y + 10);
            ctx.lineTo(p.x - 12, p.y + 10);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = "#fff"; ctx.font = "bold 12px sans-serif";
            ctx.fillText("観測所(OP)", p.x + 16, p.y + 5);
        }

        // ③ 目標座標 (赤十字)
        if (points.target.valid) {
            const p = toPX(points.target.x, points.target.y);
            ctx.strokeStyle = "#ff6b6b";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(p.x - 15, p.y); ctx.lineTo(p.x + 15, p.y);
            ctx.moveTo(p.x, p.y - 15); ctx.lineTo(p.x, p.y + 15);
            ctx.stroke();
            
            ctx.fillStyle = "#ff6b6b";
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = "#fff"; ctx.font = "bold 12px sans-serif";
            ctx.fillText("目標(TG)", p.x + 18, p.y + 5);
        }

        info.innerText = `Scale: ${scale.toFixed(2)} (1マス=100m)`;
    }

    function zoomAt(centerX, centerY, zoomFactor) {
        const newScale = scale * zoomFactor;
        if (newScale < 0.05 || newScale > 20) return; 
        offset.x = centerX - (centerX - offset.x) * zoomFactor;
        offset.y = centerY - (centerY - offset.y) * zoomFactor;
        scale = newScale;
    }

    function getPinch(t) { 
        return { 
            d: Math.hypot(t[0].clientX - t[1].clientX, t[0].clientY - t[1].clientY), 
            m: { x: (t[0].clientX + t[1].clientX) / 2, y: (t[0].clientY + t[1].clientY) / 2 } 
        }; 
    }

    // --- タッチイベント（メニュー外タップ検出も含む） ---
    canvas.addEventListener('touchstart', e => {
        // メニューが開いているときにマス目（Canvas）を触ったらメニューを閉じる
        if(sidePanel.classList.contains('open')) {
            closeMenu();
            return;
        }

        if(e.touches.length == 1){ 
            isDragging = true; 
            lastX = e.touches[0].clientX; 
            lastY = e.touches[0].clientY; 
        } else if(e.touches.length == 2){ 
            isDragging = false; 
            const p = getPinch(e.touches); 
            lastPinchDist = p.d; 
        }
    });

    canvas.addEventListener('touchmove', e => {
        if(!isDragging && lastPinchDist === null) return;
        e.preventDefault();
        
        if(e.touches.length == 1 && isDragging){ 
            offset.x += e.touches[0].clientX - lastX; 
            offset.y += e.touches[0].clientY - lastY; 
            lastX = e.touches[0].clientX; 
            lastY = e.touches[0].clientY; 
        } else if(e.touches.length == 2){ 
            const p = getPinch(e.touches); 
            if(lastPinchDist){ 
                zoomAt(p.m.x, p.m.y, p.d / lastPinchDist);
                lastPinchDist = p.d; 
            } 
        }
        render();
    }, {passive:false});

    window.addEventListener('touchend', () => { isDragging = false; lastPinchDist = null; });
    
    // --- マウスイベント（メニュー外クリック検出も含む） ---
    canvas.addEventListener('mousedown', e => { 
        if(sidePanel.classList.contains('open')) {
            closeMenu();
            return;
        }
        isDragging = true; lastX = e.clientX; lastY = e.clientY; 
    });
    window.addEventListener('mousemove', e => { 
        if(isDragging){ 
            offset.x += e.clientX - lastX; 
            offset.y += e.clientY - lastY; 
            lastX = e.clientX; 
            lastY = e.clientY; 
            render(); 
        }
    });
    window.addEventListener('mouseup', () => isDragging = false);
    
    canvas.addEventListener('wheel', e => { 
        e.preventDefault(); 
        zoomAt(e.clientX, e.clientY, e.deltaY > 0 ? 0.9 : 1.1);
        render(); 
    }, {passive:false});

    // 初期起動処理
    window.onresize = () => { resizeCanvas(); render(); };
    resizeCanvas();
    render(); // まっさらなマス目状態で描画
</script>
</body>
</html>
